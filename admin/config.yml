backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "Store Settings"
    files:
      - file: "_data/site.yml"
        label: "Homepage Content"
        name: "homepage"
        fields:
          - {label: "Producer Name", name: "producer_name", widget: "string"}
          - {label: "Bio", name: "bio", widget: "string"}
          - {label: "BeatStars Store ID", name: "beatstars_id", widget: "string"}
          - {label: "Background Image URL", name: "bg_image", widget: "string"}
          - {label: "Contact Email", name: "email", widget: "string"}
          - label: "Sound Kits"
            name: "sound_kits"
            widget: "list"
            fields:
              - {label: "Kit Title", name: "title", widget: "string"}
              - {label: "Price", name: "price", widget: "string"}
              - {label: "Cover Image URL", name: "image", widget: "string"}
              - {label: "BeatStars Link", name: "link", widget: "string"}
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - {label: "Service Title", name: "title", widget: "string"}
              - {label: "Price", name: "price", widget: "string"}
              - {label: "Cover Image URL", name: "image", widget: "string"}
              - {label: "BeatStars Link", name: "link", widget: "string"}